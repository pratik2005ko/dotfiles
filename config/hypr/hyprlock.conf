background {
    monitor =
    path = /home/prateek/Pictures/Wallpapers/wallhaven-4ywv8x.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 240, 1
    color = rgba(255, 255, 255, 0.15)
    rounding = 0
    position = 0, 35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Type to unlock...</i>
    hide_input = true
    position = 0, 70
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 0.85)
    font_size = 96
    font_family = JetBrains Mono
    position = 0, -90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000] echo "$(date '+%A, %B %d')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, -30
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] sh -c "playerctl -p spotify,firefox,chromium,brave metadata --format '{{artist}} - {{title}}' 2>/dev/null || echo 'No music playing'"
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 145
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] sh -c "curl -s 'wttr.in?format=%c+%t+%w' 2>/dev/null || echo '--'"
    color = rgba(255, 255, 255, 0.45)
    font_size = 13
    font_family = JetBrains Mono
    position = -700, -370
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:5000] sh -c "cpu=\$(ps -eo %cpu --sort=-%cpu 2>/dev/null | head -2 | tail -1 | tr -d ' '); mem=\$(free -h 2>/dev/null | awk '/^Mem:/ {print \$3}'); echo \"CPU \${cpu}%  |  RAM \${mem}\""
    color = rgba(255, 255, 255, 0.45)
    font_size = 13
    font_family = JetBrains Mono
    position = 700, -370
    halign = right
    valign = top
}

label {
    monitor =
    text =   Session Locked
    color = rgba(255, 255, 255, 0.35)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 240
    halign = center
    valign = center
}
