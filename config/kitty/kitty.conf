# ═══════════════════════════════════════
# Font
# ═══════════════════════════════════════
font_family              MonaspiceKr Nerd Font Mono
font_size                13
adjust_line_height       2
adjust_column_width      0
disable_ligatures        never

# ═══════════════════════════════════════
# Window & Layout
# ═══════════════════════════════════════
background_opacity       0.80
background_blur          32
dynamic_background_opacity yes
window_padding_width     24
window_border_width      2
active_border_color      #7aa2f9
inactive_border_color    #3b4261
hide_window_decorations  yes
confirm_os_window_close  0

enabled_layouts          splits,stack,tall,grid
placement_strategy       center

# ═══════════════════════════════════════
# Tab Bar
# ═══════════════════════════════════════
tab_bar_style            powerline
tab_powerline_style      round
tab_bar_edge             bottom
tab_bar_margin_width     4.0
tab_bar_min_tabs         2
active_tab_foreground    #1a1b26
active_tab_background    #7aa2f7
inactive_tab_foreground  #a9b1d6
inactive_tab_background  #1f2335
tab_bar_background       #15161e

# ═══════════════════════════════════════
# Cursor
# ═══════════════════════════════════════
cursor_shape             beam
cursor_beam_thickness    2.0
cursor_blink_interval    0.5
cursor_trail             200
cursor_trail_decay        0.1 0.4
cursor_trail_start_threshold 3

# ═══════════════════════════════════════
# Scrollback
# ═══════════════════════════════════════
scrollback_lines         10000
scrollback_pager_history_size 100
wheel_scroll_multiplier  5.0

# ═══════════════════════════════════════
# Mouse
# ═══════════════════════════════════════
mouse_hide_wait          2.0
# selection_to_clipboard   true

# ═══════════════════════════════════════
# Performance
# ═══════════════════════════════════════
repaint_delay            10
input_delay              3
sync_to_monitor          yes

# ═══════════════════════════════════════
# Terminal
# ═══════════════════════════════════════
shell_integration        enabled
allow_remote_control     yes
enable_audio_bell        no
notify_on_cmd_finish     invisible 20
remember_window_size     no
initial_window_width     900
initial_window_height    600

# ── Keybindings ──
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+backslash change_font_size all 0
map ctrl+shift+l         next_layout

# BEGIN_KITTY_THEME
include tokyo-night.conf
# END_KITTY_THEME
